<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Product</title>
<link rel="icon" type="image/png" href="logo.png">

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlZFRVIgRVhQTE9SRVIiLAogICJzaG9ydF9uYW1lIjogIlZFRVItWCIsCiAgInN0YXJ0X3VybCI6ICIuLyIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzAyMDYxNyIsCiAgInRoZW1lX2NvbG9yIjogIiM2MzY2ZjEiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8xMzg0LzEzODQwNjAucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #cfff00;
            --accent: #ff0055;
            --bg: #ffffff;
            --text: #000000;
            --gray: #f4f4f4;
            --border-width: 3px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: white; border-bottom: var(--border-width) solid var(--text);
        }
        .logo { font-weight: 900; font-size: 1.8rem; text-transform: uppercase; letter-spacing: -2px; }

        .search-container { flex-grow: 1; margin: 0 30px; max-width: 400px; }
        #search-input {
            width: 100%; padding: 10px 15px; border: 2px solid var(--text);
            font-weight: 700; text-transform: uppercase; outline: none;
        }

        /* Hero Section */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: var(--primary); padding: 20px; border-bottom: var(--border-width) solid var(--text);
        }
        .hero h1 { 
            font-size: clamp(4rem, 15vw, 12rem); line-height: 0.85; 
            font-weight: 900; letter-spacing: -5px; text-transform: uppercase;
            overflow: hidden;
        }

        /* Marquee */
        .marquee {
            background: var(--text); color: white; padding: 15px 0; overflow: hidden; display: flex; white-space: nowrap;
            border-bottom: var(--border-width) solid var(--text);
        }
        .marquee-content { display: flex; animation: scroll 20s linear infinite; font-weight: 900; text-transform: uppercase; font-size: 1.2rem; }
        .marquee-content span { padding: 0 40px; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Grid */
        .shop-header { padding: 80px 5% 40px; font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 900; text-transform: uppercase; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 0; background: var(--text); border: var(--border-width) solid var(--text);
        }
        .product-card {
            background: white; padding: 40px; cursor: default; transition: background 0.3s ease;
            border: 1px solid var(--text); position: relative;
        }
        .product-card:hover { background: var(--primary); }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 25px; border: var(--border-width) solid var(--text); background: var(--gray); }
        .product-card h3 { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }

        /* Detail Panel */
        #detail-panel {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%;
            background: white; z-index: 2000; display: flex; flex-direction: column; 
            overflow-y: auto; transition: right 0.3s cubic-bezier(0.5, 0, 0.3, 0.9);
        }
        #detail-panel.active { right: 0; }
        
        .close-btn { 
            align-self: flex-start; margin: 30px 0 0 30px;
            font-weight: 900; cursor: default; background: var(--text);
            color: red; padding: 12px 25px; text-transform: uppercase; border: none;
        }
        
        .detail-content { 
            display: flex; flex-wrap: wrap; gap: 40px; 
            max-width: 1200px; margin: 40px auto 120px; padding: 0 5%;
        }
        .detail-img { flex: 1; min-width: 300px; border: var(--border-width) solid var(--text); max-height: 60vh; object-fit: cover; }
        
        .buy-now-container {
            position: sticky; bottom: 0; width: 100%; 
            background: white; border-top: var(--border-width) solid var(--text);
            padding: 20px 5%; z-index: 2050; margin-top: auto;
        }
        .buy-now {
            display: block; width: 100%; padding: 25px; 
            background: var(--text); color: var(--primary); 
            border: none; font-weight: 900; cursor: default;
            font-size: 1.2rem; text-transform: uppercase; 
            text-align: center; letter-spacing: 5px;
            transition: all 0.5s ease;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }

        /* Responsive Fixes */
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .detail-content { flex-direction: column; padding: 20px; margin: 20px auto 80px; }
            .detail-img { min-width: 100%; max-height: 300px; }
            #panel-title { font-size: 2rem !important; }
            #panel-price { font-size: 1.5rem !important; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Try</div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="SEARCH GEAR..." onkeyup="searchProducts()">
        </div>
        
    </nav>

    <div id="detail-panel">
        <button class="close-btn" onclick="closePanel()">CLOSE</button>
        <div class="detail-content">
            <img src="" id="panel-img" class="detail-img">
            <div class="detail-info">
                <h2 id="panel-title" style="font-size: 3rem; font-weight: 900; text-transform: uppercase;"></h2>
                <p id="panel-desc" style="margin-top: 20px; line-height: 1.6; color: #555;"></p>
                <div id="panel-price" style="font-size: 2.5rem; font-weight: 900; margin-top: 20px;"></div>
            </div>
        </div>
        <div class="buy-now-container">
            <button id="dynamic-buy-btn" class="buy-now">Buy Now — Checkout</button>
        </div>
    </div>

    <section class="hero">
        <h1 class="reveal">FIND YOUR<br>PRODUCT.</h1>
    </section>

    <div class="marquee">
        <div class="marquee-content">
            <span>2026 EDITION</span><span>GLOBAL SHIPPING</span><span>PREMIUM QUALITY</span><span>FAST DELIVERY</span><span>BEST QUALITY</span><span>INVITE YOUR FRIENDS</span>
        </div>
    </div>

    <h2 class="shop-header">The Catalog</h2>
    <div class="grid" id="product-grid"></div>

    <script>
        const products = [
            { id: 1, name: "Snekaer", price: "₹2200", desc: "Aerodynamic high-speed footwear.", img: "snekaer.jpg", link: "https://amzn.to/4muZs3U" },
{ id: 1, name: "Mobile Stand", price: "₹149", desc: "Mobile Phone Charging Stand, Storage Holder, Bedside Fixed Rack, Home Organization Supplies, Bedroom and Office Accessories, Bathroom Storage.", img: "home.jpg", link: "https://amzn.to/4tZTpqT" },
            { id: 1, name: "Smooth Leather Bag", price: "₹350", desc: "Gear 14 cms Blue Casual Backpack.", img: "bag.jpg", link: "https://amzn.to/4vzfUEC" },
{ id: 1, name: "Cleaner For House", price: "₹120", desc: "Bathroom Plastic Cleaning Brush,Tiles Cleaning Brush,Hard Bristle Rotating Crevice Gap Cleaning Brushes For Bathroom,Floor Cleaner.", img: "clear.jpg", link: "https://amzn.to/42mlP2d" },
            { id: 1, name: "Stainless Steel Julienne", price: "₹500", desc: "✅ 2-in-1 Multifunctional Design :- Effortlessly peel.", img: "julni.jpg", link: "https://amzn.to/4sMKEiX" },
{ id: 1, name: "Stainless Steel Julienne", price: "₹500", desc: "Gear 22 ltrs Black and Royal Blue Casual Backpack.", img: "bag1.jpg", link: "https://amzn.to/4crcnzl" },
            { id: 1, name: "Strap Fan", price: "₹200", desc: "EXHEART EXF-311WT Neck Strap Fan.", img: "fan1.jpg", link: "https://amzn.to/4mv0EUW" },
            { id: 1, name: "Neon Runner", price: "₹2500", desc: "Aerodynamic high-speed footwear.", img: "shoe.jpg", link: "https://amzn.to/4dPd340" },
            { id: 2, name: "Noise Watch", price: "₹5200", desc: "Titanium casing with smart tracking.", img: "watch.jpg", link: "https://amzn.to/4vsNGLC" },
            { id: 3, name: "Rgb light", price: "₹599", desc: "One94Store 5 Meter Smart RGB Neon LED Strip Lights with App & Remote", img: "light.jpg", link: "https://amzn.to/4tyjcqp" },
            { id: 3, name: "Hand Fan", price: "₹299", desc: "The most attractive and athetic hand fan for personal use rechargable and more useful.", img: "fan.jpg", link: "https://amzn.to/4tISWZN" },
{ id: 3, name: "Chips Cutter", price: "₹172", desc: "Sharp, stainless steel blades for easy grating.", img: "cutter.jpg", link: "https://amzn.to/4tVMY7Y" },
            { id: 3, name: "Valentine Gift", price: "₹299", desc: "CraftIndia Valentine Gift for Girlfriend Boyfriend", img: "statue.jpg", link: "https://amzn.to/42a99vj" },
            { id: 4, name: "Ram Statue", price: "₹100", desc: "The most cutest statue over earth and more atrractive.", img: "ram.jpg", link: "https://amzn.to/4vAUqas" }
        ];

        function initShop(filter = "") {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `<img src="${p.img}" onerror="this.src='https://via.placeholder.com/400'"><h3>${p.name}</h3><div>${p.price}</div>`;
                card.onclick = () => openPanel(p);
                grid.appendChild(card);
            });
        }

        function searchProducts() {
            const term = document.getElementById('search-input').value;
            initShop(term);
        }

        function openPanel(p) {
            document.getElementById('panel-img').src = p.img;
            document.getElementById('panel-title').innerText = p.name;
            document.getElementById('panel-desc').innerText = p.desc;
            document.getElementById('panel-price').innerText = p.price;
            
            const btn = document.getElementById('dynamic-buy-btn');
            btn.onclick = () => window.location.href = p.link;

            document.getElementById('detail-panel').classList.add('active');
            gsap.from(".detail-info > *", { opacity: 0, x: 50, stagger: 0.1, duration: 0.5 });
        }

        function closePanel() { document.getElementById('detail-panel').classList.remove('active'); }

        function startAnimations() {
            gsap.registerPlugin(ScrollTrigger);
            gsap.from(".reveal", { 
                y: 100, 
                opacity: 0, 
                duration: 1.5, 
                ease: "power4.out" 
            });
        }

        window.onload = () => {
            initShop();
            startAnimations();
        };
    </script>
</body>
</html>

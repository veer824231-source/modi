<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Bag | Veer Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap');

        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #ff4757;
            --secondary-bg: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Desktop par no scrolling */
            background-color: var(--bg);
            color: var(--text);
        }

        /* Responsive Container */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Organic Background Shapes */
        .circle-bg {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ffeef0 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        /* Main Card - No Squares */
        .product-card {
            width: 100%;
            max-width: 1000px;
            height: auto;
            max-height: 90vh;
            background: var(--bg);
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-radius: 60px; /* High curvature */
            padding: 40px;
            position: relative;
            z-index: 2;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }

        /* Left Side */
        .details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }

        .category {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 0.8rem;
        }

        h1 {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .price-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .price {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text);
        }

        .mrp {
            text-decoration: line-through;
            color: #aaa;
            font-size: 1.2rem;
        }

        .buy-btn {
            background: var(--text);
            color: white;
            padding: 22px 45px;
            border-radius: 100px; /* Full Curve */
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .buy-btn:hover {
            transform: scale(1.05);
            background: var(--accent);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.3);
        }

        /* Right Side */
        .visual {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-wrapper {
            background: var(--secondary-bg);
            width: 100%;
            height: 100%;
            border-radius: 50px; /* Big Curve */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: visible;
        }

        .product-img {
            width: 120%;
            height: auto;
            transform: rotate(-5deg);
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.15));
            animation: floating 5s infinite ease-in-out;
            transition: 0.5s;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(0deg); }
        }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            body, html { overflow-y: auto; } /* Allow scrolling on mobile */
            .container { height: auto; padding: 20px 10px; }
            .product-card {
                grid-template-columns: 1fr;
                border-radius: 40px;
                padding: 30px 20px;
                text-align: center;
            }
            .details { order: 2; padding: 0; }
            .visual { order: 1; height: 300px; margin-bottom: 40px; }
            h1 { font-size: 2.5rem; }
            .buy-btn { width: 100%; justify-content: center; }
            .img-wrapper { border-radius: 30px; }
            .product-img { width: 90%; }
        }
    </style>
</head>
<body>

    <div class="circle-bg"></div>

    <main class="container">
        <div class="product-card">
            
            <section class="details">
                <p class="category">Best Seller 2026</p>
                <h1>Modern<br>Urban Bag</h1>
                
                <div class="price-container">
                    <span class="price">₹699</span>
                    <span class="mrp">₹1,999</span>
                </div>

                <a href="https://amzn.to/41jgiJx" class="buy-btn">
                    Buy Now
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                </a>
            </section>

            <section class="visual">
                <div class="img-wrapper">
                    <img src="c.png" alt="Bag Image" class="product-img">
                </div>
            </section>

        </div>
    </main>

    <script>
        // Smooth mouse interaction
        document.addEventListener('mousemove', (e) => {
            const img = document.querySelector('.product-img');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            img.style.transform = `translateX(${x}px) translateY(${y}px) rotate(${x}deg)`;
        });
    </script>
</body>
</html>

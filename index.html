<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON AURA Pro | White Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root {
            --primary: #007AFF; /* Apple Blue */
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.05);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #ffffff; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        /* The Drawing Stage */
        #stage { 
            position: absolute; width: 100vw; height: 100vh; 
            background: #ffffff; display: flex; align-items: center; justify-content: center;
        }

        canvas#paintCanvas { 
            background: transparent;
            filter: drop-shadow(0 0 12px var(--glow-color, #007AFF));
            touch-action: none;
        }

        /* Top HUD - Floating Glass */
        #hud-header {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 450px; padding: 15px 25px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }

        .status-pill { display: flex; flex-direction: column; }
        .version { font-size: 9px; font-weight: 800; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        #current-mode { font-size: 18px; font-weight: 600; color: #333; }

        /* Color Picker Stylized */
        #neonColor {
            appearance: none; -webkit-appearance: none;
            width: 40px; height: 40px; border: 3px solid white; 
            border-radius: 50%; cursor: pointer; background: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Mobile Camera Preview */
        #preview-container {
            position: absolute; bottom: 110px; right: 20px; 
            width: 120px; height: 160px; border-radius: 20px;
            overflow: hidden; border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #f0f0f0; transform: scaleX(-1);
            z-index: 900;
        }

        /* Bottom Controls Legend */
        #controls-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 450px; padding: 15px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 25px; border: 1px solid var(--border);
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            z-index: 1000;
        }

        .gesture-item { font-size: 11px; color: #666; display: flex; align-items: center; gap: 8px; }
        .gesture-item b { color: #000; }

        /* Reticle / Cursor */
        #reticle {
            position: fixed; width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid #333; pointer-events: none; z-index: 2000;
            transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s;
        }

        #clear-progress {
            position: absolute; bottom: 0; left: 0; height: 4px; 
            background: #FF3B30; width: 0%; border-radius: 0 0 25px 25px;
        }
    </style>
</head>
<body>

<div id="reticle"></div>

<div id="hud-header">
    <div class="status-pill">
        <span class="version">System Active</span>
        <span id="current-mode">Detecting...</span>
    </div>
    <input type="color" id="neonColor" value="#007AFF">
</div>

<div id="stage">
    <canvas id="paintCanvas"></canvas>
</div>

<div id="preview-container">
    <video id="input_video" style="display:none" playsinline></video>
    <canvas id="ui_canvas" style="width:100%; height:100%; object-fit: cover;"></canvas>
</div>

<div id="controls-bar">
    <div class="gesture-item">☝️ <b>Index:</b> Draw</div>
    <div class="gesture-item">🖐️ <b>Palm:</b> Erase</div>
    <div class="gesture-item">✌️ <b>V-Sign:</b> Sparkle</div>
    <div class="gesture-item">✊ <b>Fist:</b> Clear (Hold)</div>
    <div id="clear-progress"></div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const paintCanvas = document.getElementById('paintCanvas');
    const ctx = paintCanvas.getContext('2d');
    const uiCanvas = document.getElementById('ui_canvas');
    const uiCtx = uiCanvas.getContext('2d');
    const reticle = document.getElementById('reticle');
    const modeLabel = document.getElementById('current-mode');
    const colorPick = document.getElementById('neonColor');
    const clearProgress = document.getElementById('clear-progress');

    let lastX = 0, lastY = 0;
    let smoothX = 0, smoothY = 0;
    let fistStartTime = null;
    const lerp = 0.35; // Smoothing for fluid movement

    function init() {
        paintCanvas.width = window.innerWidth;
        paintCanvas.height = window.innerHeight;
        uiCanvas.width = 480;
        uiCanvas.height = 640;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    function onResults(results) {
        // Draw Mirror Preview
        uiCtx.save();
        uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
        uiCtx.drawImage(results.image, 0, 0, uiCanvas.width, uiCanvas.height);
        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                drawConnectors(uiCtx, landmarks, HAND_CONNECTIONS, {color: '#007AFF', lineWidth: 2});
                drawLandmarks(uiCtx, landmarks, {color: '#FFFFFF', lineWidth: 1, radius: 2});
            }
        }
        uiCtx.restore();

        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            modeLabel.innerText = "Show Hand";
            fistStartTime = null;
            clearProgress.style.width = "0%";
            return;
        }

        const hand = results.multiHandLandmarks[0];
        const index = hand[8];
        const middle = hand[12];
        const ring = hand[16];
        const pinky = hand[20];

        // Map coordinates
        const targetX = (1 - index.x) * window.innerWidth;
        const targetY = index.y * window.innerHeight;

        smoothX += (targetX - smoothX) * lerp;
        smoothY += (targetY - smoothY) * lerp;

        reticle.style.left = smoothX + 'px';
        reticle.style.top = smoothY + 'px';

        // Gesture Logic
        const isIndexUp = index.y < hand[6].y;
        const isMiddleUp = middle.y < hand[10].y;
        const isRingUp = ring.y < hand[14].y;
        const isPinkyUp = pinky.y < hand[18].y;

        const isPalm = isIndexUp && isMiddleUp && isRingUp && isPinkyUp;
        const isFist = !isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp;
        const isV = isIndexUp && isMiddleUp && !isRingUp;

        // Styles
        ctx.strokeStyle = colorPick.value;
        ctx.fillStyle = colorPick.value;
        ctx.shadowColor = colorPick.value;
        ctx.shadowBlur = 10;
        paintCanvas.style.setProperty('--glow-color', colorPick.value);

        if (isFist) {
            if (!fistStartTime) fistStartTime = Date.now();
            let elapsed = Date.now() - fistStartTime;
            clearProgress.style.width = Math.min((elapsed / 1000) * 100, 100) + "%";
            modeLabel.innerText = "Clearing...";
            if (elapsed > 1000) {
                ctx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                fistStartTime = null;
            }
        } else {
            fistStartTime = null;
            clearProgress.style.width = "0%";

            if (isPalm) {
                modeLabel.innerText = "Eraser";
                reticle.style.width = '60px'; reticle.style.height = '60px';
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 60;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(smoothX, smoothY);
                ctx.stroke();
                ctx.globalCompositeOperation = 'source-over';
            } else if (isV) {
                modeLabel.innerText = "Sparkles";
                reticle.style.width = '30px'; reticle.style.height = '30px';
                for(let i=0; i<4; i++) {
                    ctx.globalAlpha = Math.random();
                    ctx.beginPath();
                    ctx.arc(smoothX + (Math.random()-0.5)*40, smoothY + (Math.random()-0.5)*40, Math.random()*5, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            } else if (isIndexUp) {
                modeLabel.innerText = "Sketching";
                reticle.style.width = '12px'; reticle.style.height = '12px';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(smoothX, smoothY);
                ctx.stroke();
            }
        }
        lastX = smoothX; lastY = smoothY;
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 480, height: 640
    });

    window.onload = () => { init(); camera.start(); };
    window.onresize = () => { init(); };
</script>
</body>
</html>

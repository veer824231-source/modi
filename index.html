<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEER_ULTRA_V5_ORBITAL_COMMAND</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --hacker-neon: #00ff66; --deep-bg: #010801; --strike-red: #ff003c; --track-blue: #00f2ff; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--deep-bg); color: var(--hacker-neon); overflow: hidden; touch-action: none; }
        
        #map { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; 
            filter: brightness(0.3) contrast(1.8) grayscale(1) sepia(100%) hue-rotate(85deg);
            transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .map-overlay {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(circle at center, transparent 15%, rgba(0,0,0,0.85) 100%);
            border: 20px solid rgba(0, 255, 102, 0.02);
        }

        /* Neural Biometric */
        .neural-scanner {
            width: 140px; height: 140px; border-radius: 50%; border: 1px solid var(--hacker-neon);
            position: relative; display: flex; items-center; justify-center; cursor: pointer;
            background: radial-gradient(circle, rgba(0,255,102,0.1) 0%, transparent 70%);
        }
        .pulse-ring {
            position: absolute; inset: -10px; border: 1px solid var(--hacker-neon);
            border-radius: 50%; opacity: 0; transform: scale(0.5);
        }

        /* Tracking UI */
        .tracking-box {
            position: absolute; width: 80px; height: 80px; border: 1px solid var(--track-blue);
            transform: translate(-50%, -50%); display: none; z-index: 10; pointer-events: none;
        }
        .tracking-box::before { content: 'ID: TARGET_ALPHA'; position: absolute; top: -15px; font-size: 8px; color: var(--track-blue); white-space: nowrap; }

        .hud-panel { background: rgba(0, 10, 5, 0.92); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 102, 0.3); }
        .interactive { pointer-events: auto; }

        #reticle {
            position: fixed; width: 160px; height: 160px; border: 0.5px solid rgba(0, 255, 102, 0.1);
            border-radius: 50%; pointer-events: none; z-index: 20; transform: translate(-50%, -50%);
        }

        .data-stream { font-size: 8px; font-family: monospace; color: var(--hacker-neon); opacity: 0.6; }
        
        .strike-anim {
            position: fixed; top: 0; left: 50%; width: 2px; height: 0;
            background: linear-gradient(to bottom, transparent, var(--strike-red));
            z-index: 99; pointer-events: none;
        }
    </style>
</head>
<body class="h-screen w-full select-none">

    <div id="map"></div>
    <div class="map-overlay"></div>
    <div id="reticle">
        <div class="absolute top-1/2 left-0 w-4 h-[1px] bg-green-500"></div>
        <div class="absolute top-1/2 right-0 w-4 h-[1px] bg-green-500"></div>
        <div class="absolute top-0 left-1/2 w-[1px] h-4 bg-green-500"></div>
        <div class="absolute bottom-0 left-1/2 w-[1px] h-4 bg-green-500"></div>
    </div>
    
    <div id="targetBox" class="tracking-box">
        <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-cyan-400"></div>
        <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-cyan-400"></div>
    </div>

    <div id="laserStrike" class="strike-anim"></div>

    <div class="relative z-30 flex flex-col h-full p-4 md:p-6 pointer-events-none">
        
        <div class="flex justify-between items-start">
            <div class="hud-panel p-4 w-72">
                <div class="flex items-center gap-2 mb-3 border-b border-white/10 pb-2">
                    <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                    <span class="text-[10px] font-bold tracking-tighter">ORBITAL_COMMAND_LINK</span>
                </div>
                <div class="interactive flex gap-2">
                    <input type="text" id="locInput" placeholder="COORD_SEARCH..." class="bg-black border border-green-900 text-[10px] p-2 flex-grow outline-none">
                    <button onclick="locSearch()" class="bg-green-900 px-3 text-[10px] hover:bg-green-500 hover:text-black">FIX</button>
                </div>
                <div id="telemetry" class="mt-4 grid grid-cols-2 gap-2 text-[8px] opacity-80 hidden">
                    <div class="border border-cyan-900 p-1">VEL: <span class="text-cyan-400">12.4m/s</span></div>
                    <div class="border border-cyan-900 p-1">ALT: <span class="text-cyan-400">240m</span></div>
                </div>
            </div>

            <div class="hud-panel p-4 text-right min-w-[200px]">
                <h1 class="text-xl font-black text-white italic">VEER_CORE_V5</h1>
                <div class="flex flex-col gap-2 mt-3 interactive">
                    <button id="trackBtn" onclick="toggleTrack()" class="hidden border border-cyan-500 text-cyan-500 text-[9px] py-1 px-3 hover:bg-cyan-500 hover:text-black">INIT_NEURAL_TRACK</button>
                    <button id="strikeBtn" onclick="armStrike()" class="hidden border border-red-500 text-red-500 text-[9px] py-1 px-3 hover:bg-red-500 hover:text-black">ARM_STRIKE_PK</button>
                </div>
            </div>
        </div>

        <div class="flex-grow flex flex-col items-center justify-center">
            <div id="authPanel" class="hud-panel p-10 text-center w-80 interactive border-t-4 border-green-500">
                <h2 id="authMsg" class="text-2xl font-black text-white mb-8 tracking-tighter">LEVEL_5_LOCK</h2>
                
                <div class="flex justify-center mb-8">
                    <div class="neural-scanner" id="fingerBtn" onmousedown="startSync()" onmouseup="stopSync()" ontouchstart="startSync()" ontouchend="stopSync()">
                        <div class="pulse-ring" id="ring1"></div>
                        <div class="pulse-ring" id="ring2"></div>
                        <svg class="w-16 h-16 text-green-500 opacity-30" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM12 6c-3.31 0-6 2.69-6 6v3c0 .55.45 1 1 1s1-.45 1-1v-3c0-2.21 1.79-4 4-4s4 1.79 4 4v3c0 .55.45 1 1 1s1-.45 1-1v-3c0-3.31-2.69-6-6-6z"/></svg>
                        <div id="syncProgress" class="absolute inset-0 border-4 border-green-500 rounded-full clip-path-0 transition-all"></div>
                    </div>
                </div>
                
                <p class="text-[8px] opacity-40 uppercase tracking-[0.2em]">Maintain Neural Contact</p>
            </div>
        </div>

        <div class="mt-auto flex justify-between items-end">
            <div class="hud-panel p-3 text-[9px] font-mono">
                <p class="text-white">COORDS: <span id="latlng">0.00, 0.00</span></p>
                <p>SAT_NAME: <span class="text-green-500">GAYA_SENTINEL_05</span></p>
            </div>
            <div class="text-right">
                <p id="clock" class="text-xl font-bold text-white mb-1">00:00:00</p>
                <div class="flex gap-1 justify-end">
                    <div class="w-1 h-3 bg-green-500 animate-pulse"></div>
                    <div class="w-1 h-3 bg-green-500"></div>
                    <div class="w-1 h-3 bg-green-500 animate-pulse"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        let isSyncing = false, syncVal = 0, isTracking = false, isStrikeArmed = false;

        // Map Setup
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([24.6951, 84.9913], 15);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        function speak(t) {
            synth.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'hi-IN'; u.pitch = 0.4; u.rate = 1.1;
            synth.speak(u);
        }

        // Biometric Neural Sync
        function startSync() {
            isSyncing = true;
            speak("Neural synchronization shuru. Veer, finger hold karein.");
            gsap.to("#ring1", { opacity: 0.5, scale: 1.5, duration: 1, repeat: -1 });
            gsap.to("#ring2", { opacity: 0.3, scale: 2, duration: 1.5, repeat: -1, delay: 0.5 });
            
            const itv = setInterval(() => {
                if(!isSyncing) { clearInterval(itv); return; }
                syncVal += 2;
                if(syncVal >= 100) {
                    clearInterval(itv);
                    breachSuccess();
                }
            }, 50);
        }

        function stopSync() {
            isSyncing = false;
            if(syncVal < 100) {
                syncVal = 0;
                gsap.killTweensOf(".pulse-ring");
                gsap.set(".pulse-ring", { opacity: 0, scale: 0.5 });
                speak("Sync failed.");
            }
        }

        function breachSuccess() {
            speak("Welcome back, Veer. Orbital command aapke haath mein hai.");
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('trackBtn').classList.remove('hidden');
            document.getElementById('strikeBtn').classList.remove('hidden');
            document.getElementById('map').style.filter = "brightness(0.9) contrast(1.2) grayscale(0) sepia(0)";
            map.flyTo(map.getCenter(), 18, { duration: 3 });
        }

        // Global Loc Search
        async function locSearch() {
            const q = document.getElementById('locInput').value;
            if(!q) return;
            speak(`Satellite move ho raha hai. Target: ${q}`);
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
            const data = await res.json();
            if(data[0]) map.flyTo([data[0].lat, data[0].lon], 17, { duration: 5 });
        }

        // Neural Tracking
        function toggleTrack() {
            isTracking = !isTracking;
            const box = document.getElementById('targetBox');
            const telemetry = document.getElementById('telemetry');
            
            if(isTracking) {
                speak("Neural track active. Targeting alpha locked.");
                box.style.display = 'block';
                telemetry.classList.remove('hidden');
                document.getElementById('trackBtn').innerText = "DISENGAGE_TRACK";
                document.getElementById('trackBtn').classList.add('bg-cyan-500', 'text-black');
            } else {
                speak("Tracking disengaged.");
                box.style.display = 'none';
                telemetry.classList.add('hidden');
                document.getElementById('trackBtn').innerText = "INIT_NEURAL_TRACK";
                document.getElementById('trackBtn').classList.remove('bg-cyan-500', 'text-black');
            }
        }

        // Strike Protocol
        function armStrike() {
            isStrikeArmed = true;
            document.body.style.cursor = "crosshair";
            speak("Kinetic Strike arm ho gaya hai. Satellite target select karein.");
            document.getElementById('strikeBtn').innerText = "SELECT_COORDINATES";
        }

        map.on('click', (e) => {
            if(!isStrikeArmed) return;
            isStrikeArmed = false;
            const laser = document.getElementById('laserStrike');
            const x = event.clientX;
            
            speak("Target locked. Orbital strike initiating.");
            
            laser.style.left = x + 'px';
            gsap.to(laser, { height: '100vh', duration: 2.5, ease: "power4.in", onComplete: () => {
                gsap.to(laser, { opacity: 0, duration: 0.2, onComplete: () => {
                    laser.style.height = 0; laser.style.opacity = 1;
                    speak("Direct impact confirmed. Target neutralized.");
                    document.getElementById('strikeBtn').innerText = "ARM_STRIKE_PK";
                }});
            }});
        });

        // Loop Updates
        window.addEventListener('mousemove', e => {
            gsap.to("#reticle", { left: e.clientX, top: e.clientY, duration: 0.1 });
            if(isTracking) gsap.to("#targetBox", { left: e.clientX, top: e.clientY, duration: 0.2 });
            const c = map.getCenter();
            document.getElementById('latlng').innerText = `${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}`;
        });

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.onclick = () => { 
            if(syncVal === 0 && !document.getElementById('authPanel').style.display === 'none') 
                speak("Terminal locked. Veer, fingerprint verification required."); 
        };
    </script>
</body>
</html>

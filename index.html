<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAMBOO - Ultra Real Power Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #55a64a;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.2);
            --danger: #ef4444;
            --power: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #020617; font-family: 'Outfit', sans-serif; color: white; }
        canvas { display: block; }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.8) 0%, #020617 100%);
        }

        .logo-text { font-size: 65px; font-weight: 900; color: var(--primary); text-shadow: 0 0 30px rgba(85, 166, 74, 0.6); margin-bottom: 20px; letter-spacing: 5px; }
        .main-menu { display: flex; flex-direction: column; gap: 12px; width: 220px; }
        .btn-main { padding: 15px; border-radius: 18px; border: none; background: var(--primary); color: white; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-secondary { padding: 12px; border-radius: 15px; border: 1px solid var(--border); background: var(--glass); backdrop-filter: blur(10px); color: white; font-weight: 600; cursor: pointer; }

        #settingsPanel, #skinPanel {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px); z-index: 180; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .panel-card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; padding: 10px 15px; background: rgba(255,255,255,0.05); border-radius: 12px; }

        .skin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px; margin-bottom: 20px; }
        .skin-item { width: 90px; height: 90px; border-radius: 20px; background: var(--glass); border: 2px solid transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .skin-item.active { border-color: var(--primary); background: rgba(85, 166, 74, 0.2); }
        .skin-item img { max-width: 70%; max-height: 70%; object-fit: contain; }

        #gameOverScreen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        #goImg { width: 80%; max-width: 320px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); box-shadow: 0 0 50px rgba(85, 166, 74, 0.3); }

        #hud { position: absolute; top: 30px; width: 100%; text-align: center; z-index: 50; pointer-events: none; }
        .score-box { background: rgba(0,0,0,0.6); padding: 8px 30px; border-radius: 50px; font-size: 38px; font-weight: 900; border: 1px solid var(--border); }

        #settingsBtn { position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; z-index: 160; background: var(--glass); border-radius: 12px; padding: 8px; border: 1px solid var(--border); cursor: pointer; }

        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #444; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
        select { background: #1e293b; color: white; border: 1px solid var(--border); border-radius: 5px; padding: 2px 5px; }
    </style>
</head>
<body>

    <div id="hud"><div class="score-box" id="scoreText">0</div></div>
    <img id="settingsBtn" src="ss.png" alt="Settings" onclick="toggleSettings(true)">

    <div id="startScreen" class="overlay">
        <h1 class="logo-text">BAMBOO</h1>
        <div class="main-menu">
            <button class="btn-main" onclick="begin()">START MISSION</button>
            <button class="btn-secondary" onclick="toggleSkins(true)">👕 AVATARS</button>
            <div id="homeHighScore" style="text-align: center; font-size: 14px; opacity: 0.6; margin-top: 10px;">Best: 0</div>
        </div>
    </div>

    <div id="settingsPanel">
        <div class="panel-card">
            <h2 style="text-align: center; margin-bottom: 20px;">SETTINGS</h2>
            <div class="setting-row"><span>Audio</span><label class="switch"><input type="checkbox" id="soundToggle" checked><span class="slider"></span></label></div>
            <div class="setting-row"><span>Level</span><select id="diffSelect"><option value="easy">Easy</option><option value="normal" selected>Normal</option><option value="hard">Hard</option></select></div>
            <button class="btn-main" style="width:100%; margin-top: 15px;" onclick="toggleSettings(false)">SAVE</button>
        </div>
    </div>

    <div id="skinPanel">
        <h2 style="margin-bottom: 20px;">CHOOSE HERO</h2>
        <div class="skin-grid" id="skinGrid"></div>
        <button class="btn-main" style="width: 180px;" onclick="toggleSkins(false)">CONFIRM</button>
    </div>

    <div id="gameOverScreen">
        <img id="goImg" src="" alt="Game Over">
        <h2 style="font-size: 35px; font-weight: 900; color: #ef4444;">MISSION FAILED</h2>
        <p id="finalScore" style="font-size: 24px; margin: 5px 0;">Score: 0</p>
        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button class="btn-secondary" onclick="goHome()">🏠 MENU</button>
            <button class="btn-main" onclick="resetGame()">RETRY</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let bird = { x: 80, y: 0, w: 50, h: 50, grav: 0.4, vel: 0, jump: -8, trail: [] };
        let pipes = [];
        let powerUps = [];
        let score = 0;
        let highScore = localStorage.getItem('bamboo_high') || 0;
        let gameActive = false;
        let basePipeSpeed = 4.5;
        let pipeSpeed = 4.5;
        let pipeGap = 280;
        let soundEnabled = true;
        let screenShake = 0;
        let gameTick = 0;
        let slowMoTimer = 0;

        let stars = [], clouds = [], mountains = [];
        let bgMusic = new Audio('vv.mp3'); bgMusic.loop = true; bgMusic.volume = 0.4;

        function initEnvironment() {
            stars = Array.from({length: 80}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2 }));
            clouds = Array.from({length: 6}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height/2, w: 120+Math.random()*100, sp: 0.3+Math.random() }));
            mountains = Array.from({length: 3}, (_, i) => ({ x: i * (canvas.width/2), w: canvas.width, h: 200 + Math.random()*100 }));
        }

        const skins = [
            { id: 'hero1', img: 'cc.png', goImg: 'tt.jpg', dieSound: 'gg.mp3' },
            { id: 'hero2', img: 'rr.png', goImg: 'rr.jpg', dieSound: 'mm.mp3' },
            { id: 'hero3', img: 'sk.png', goImg: 'sk.jpg', dieSound: 'sk.mp3' },
            { id: 'hero4', img: 'mm.png', goImg: 'mm.jpg', dieSound: 'rr.mp3' }
        ];

        let selectedSkin = skins[0];
        let birdImg = new Image(); birdImg.src = selectedSkin.img;

        function drawWorld() {
            gameTick++;
            let skyGrd = ctx.createLinearGradient(0,0,0,canvas.height);
            if(score < 10) { skyGrd.addColorStop(0, '#020617'); skyGrd.addColorStop(1, '#1e293b'); }
            else if(score < 25) { skyGrd.addColorStop(0, '#ff7e5f'); skyGrd.addColorStop(1, '#feb47b'); }
            else { skyGrd.addColorStop(0, '#0f0c29'); skyGrd.addColorStop(1, '#302b63'); }

            ctx.fillStyle = skyGrd; ctx.fillRect(0,0,canvas.width, canvas.height);

            if(slowMoTimer > 0) { ctx.fillStyle = "rgba(56, 189, 248, 0.1)"; ctx.fillRect(0,0,canvas.width, canvas.height); }

            ctx.fillStyle = "rgba(255,255,255,0.5)";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); if(gameActive) s.x = (s.x - (pipeSpeed*0.05) + canvas.width) % canvas.width; });

            ctx.fillStyle = score < 10 ? "#0f172a" : "#1a1a2e";
            mountains.forEach(m => {
                ctx.beginPath(); ctx.moveTo(m.x, canvas.height); ctx.lineTo(m.x + m.w/2, canvas.height - m.h); ctx.lineTo(m.x + m.w, canvas.height); ctx.fill();
                if(gameActive) m.x -= (pipeSpeed * 0.1); if(m.x + m.w < 0) m.x = canvas.width;
            });
        }

        function drawBamboo(x, y, w, h, isTop) {
            let sway = Math.sin(gameTick * 0.05) * 3;
            let grd = ctx.createLinearGradient(x + sway, 0, x + w + sway, 0);
            grd.addColorStop(0, '#2d5a27'); grd.addColorStop(0.5, '#55a64a'); grd.addColorStop(1, '#2d5a27');
            ctx.save();
            ctx.fillStyle = grd;
            ctx.translate(sway, 0);
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.lineWidth = 4;
            for(let i = 40; i < h; i += 60) {
                ctx.beginPath(); ctx.moveTo(x, isTop ? h - i : y + i); ctx.lineTo(x + w, isTop ? h - i : y + i); ctx.stroke();
            }
            ctx.restore();
        }

        function update() {
            ctx.save();
            if(screenShake > 0) { ctx.translate(Math.random()*screenShake - screenShake/2, Math.random()*screenShake - screenShake/2); screenShake *= 0.9; }

            drawWorld();

            if(gameActive) {
                if(slowMoTimer > 0) { slowMoTimer--; pipeSpeed = basePipeSpeed * 0.5; bird.grav = 0.2; bird.jump = -5.5; } 
                else { pipeSpeed = basePipeSpeed; bird.grav = 0.4; bird.jump = -8; }

                bird.vel += bird.grav; bird.y += bird.vel;
                bird.trail.push({x: bird.x + 10, y: bird.y + bird.h/2, color: slowMoTimer > 0 ? '#38bdf8' : 'white'});
                if(bird.trail.length > 15) bird.trail.shift();

                if(bird.y + bird.h > canvas.height || bird.y < 0) showGameOver();

                // Pipe Generation
                if(pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 320) {
                    let topH = Math.random()*(canvas.height/2) + 100;
                    pipes.push({ x: canvas.width, top: topH, gap: pipeGap, w: 80, passed: false });
                    // Random PowerUp Spawning
                    if(Math.random() < 0.2) {
                        powerUps.push({ x: canvas.width + 120, y: topH + pipeGap/2, s: 30, picked: false });
                    }
                }

                pipes.forEach(p => {
                    p.x -= pipeSpeed;
                    drawBamboo(p.x, 0, p.w, p.top, true); 
                    drawBamboo(p.x, p.top + p.gap, p.w, canvas.height - (p.top + p.gap), false); 
                    if(bird.x + bird.w-12 > p.x && bird.x + 12 < p.x + p.w && (bird.y + 12 < p.top || bird.y + bird.h-12 > p.top + p.gap)) showGameOver();
                    if(!p.passed && p.x < bird.x) { p.passed = true; score++; document.getElementById('scoreText').innerText = score; }
                });

                powerUps.forEach(pu => {
                    pu.x -= pipeSpeed;
                    if(!pu.picked) {
                        ctx.fillStyle = "#38bdf8"; ctx.shadowBlur = 15; ctx.shadowColor = "#38bdf8";
                        ctx.beginPath(); ctx.arc(pu.x, pu.y, 15, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText("🕒", pu.x-8, pu.y+5);
                        ctx.shadowBlur = 0;
                        if(Math.hypot(bird.x+25-pu.x, bird.y+25-pu.y) < 35) { pu.picked = true; slowMoTimer = 300; }
                    }
                });

                pipes = pipes.filter(p => p.x > -100);
                powerUps = powerUps.filter(pu => pu.x > -100);
            }

            bird.trail.forEach((t, i) => {
                ctx.fillStyle = t.color; ctx.globalAlpha = i/20;
                ctx.beginPath(); ctx.arc(t.x, t.y, i/2.5, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            ctx.save();
            ctx.shadowBlur = 15; ctx.shadowColor = slowMoTimer > 0 ? "#38bdf8" : "white";
            ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
            if(gameActive) ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.vel * 0.1)));
            ctx.drawImage(birdImg, -bird.w/2, -bird.h/2, bird.w, bird.h);
            ctx.restore();

            ctx.restore();
            requestAnimationFrame(update);
        }

        function begin() { document.getElementById('startScreen').style.display = 'none'; if(soundEnabled) bgMusic.play().catch(()=>{}); resetGame(); }
        function resetGame() { bird.y = canvas.height/2; bird.vel = 0; bird.trail = []; pipes = []; powerUps = []; score = 0; gameActive = true; slowMoTimer = 0; document.getElementById('scoreText').innerText = "0"; document.getElementById('gameOverScreen').style.display = 'none'; }
        function showGameOver() { gameActive = false; screenShake = 15; bgMusic.pause(); document.getElementById('goImg').src = selectedSkin.goImg; if(soundEnabled) new Audio(selectedSkin.dieSound).play().catch(()=>{}); if(score > highScore) { highScore = score; localStorage.setItem('bamboo_high', highScore); } document.getElementById('finalScore').innerText = "Score: " + score; document.getElementById('gameOverScreen').style.display = 'flex'; }
        function goHome() { gameActive = false; bgMusic.pause(); document.getElementById('gameOverScreen').style.display = 'none'; document.getElementById('startScreen').style.display = 'flex'; document.getElementById('homeHighScore').innerText = "Best: " + highScore; }
        function toggleSkins(show) { document.getElementById('skinPanel').style.display = show ? 'flex' : 'none'; }
        function toggleSettings(show) { document.getElementById('settingsPanel').style.display = show ? 'flex' : 'none'; if(!show) applySettings(); }
        
        function applySettings() { 
            soundEnabled = document.getElementById('soundToggle').checked; 
            if(!soundEnabled) bgMusic.pause(); else if(gameActive) bgMusic.play(); 
            const d = document.getElementById('diffSelect').value; 
            basePipeSpeed = d==='easy'?3.5:(d==='hard'?6:4.5); 
            pipeGap = d==='easy'?350:(d==='hard'?240:280); 
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initEnvironment(); }
        function initSkins() { const grid = document.getElementById('skinGrid'); grid.innerHTML = ''; skins.forEach(s => { const div = document.createElement('div'); div.className = `skin-item ${selectedSkin.id === s.id ? 'active' : ''}`; div.innerHTML = `<img src="${s.img}">`; div.onclick = () => { selectedSkin = s; birdImg.src = s.img; document.querySelectorAll('.skin-item').forEach(i => i.classList.remove('active')); div.classList.add('active'); }; grid.appendChild(div); }); }

        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', () => { if(gameActive) bird.vel = bird.jump; });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameActive) bird.vel = bird.jump; });
        
        resize(); initSkins(); update();
    </script>
</body>
</html>

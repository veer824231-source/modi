<!DOCTYPE html>
<html>
<head>
    <title>Install My App</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlZFRVIgQVBQIiwKICAic2hvcnRfbmFtZSI6ICJWRUVSU0hPUCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiaWNvbnMiOiBbCiAgICB7ICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMTM4NC8xMzg0MDYwLnBuZyIsICJzaXplcyI6ICI1MTJ4NTEyIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiB9CiAgXQp9">
    <style>
        #installBtn { display: none; padding: 15px 25px; background: #007AFF; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <button id="installBtn">DOWNLOAD APP</button>

    <script>
        let deferredPrompt;
        const btn = document.getElementById('installBtn');

        // 2. Listen for the 'ready to install' event
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Stop the default tiny browser bar
            deferredPrompt = e;  // Save it for later
            btn.style.display = 'block'; // Show YOUR custom button
        });

        btn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt(); // Show the Windows/Android install box
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // 3. Register a Service Worker (Required for the button to show)
        if ('serviceWorker' in navigator) {
            const sw = `self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));`;
            const blob = new Blob([sw], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
